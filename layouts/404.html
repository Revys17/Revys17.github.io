{{ define "main" }}
<style>
  .error-page {
    text-align: center;
    padding: 4rem 1rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .error-code {
    font-size: 6rem;
    font-weight: 800;
    margin: 0;
    line-height: 1;
    opacity: 0.3;
  }
  .error-message {
    font-size: 1.5rem;
    margin: 1rem 0 2rem;
  }
  .error-link {
    display: inline-block;
    padding: 0.75rem 2rem;
    border: 2px solid var(--primary);
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    color: var(--primary);
    transition: all 0.2s ease;
  }
  .error-link:hover {
    background: var(--primary);
    color: var(--theme);
  }
</style>

<div class="error-page">
  <p class="error-code">404</p>
  <p class="error-message">This page doesn't exist — but plenty of others do.</p>
  <a href="/" class="error-link">← Back Home</a>
</div>
{{ end }}
