baseURL = "https://revys.net/"
languageCode = "en-us"
title = "Revys | Personal Website"
theme = "PaperMod"
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Revys"
  description = "Personal website — Resume, Publications, Blog, and more."
  keywords = ["Blog", "Resume", "Publications", "Portfolio"]
  author = "Revys"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.assets]
    favicon = "/favicon.ico"

  [params.profileMode]
    enabled = true
    title = "Hello, I'm Revys"
    subtitle = "Software Engineer & Researcher"
    imageUrl = "/images/profile-placeholder.svg"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Profile Photo"
    [[params.profileMode.buttons]]
      name = "Resume"
      url = "/resume/"
    [[params.profileMode.buttons]]
      name = "Publications"
      url = "/publications/"
    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/blog/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Revys17"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:hello@revys.net"

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

[params.homeInfoParams]
  Title = "Hello, I'm Revys"
  Content = "Software Engineer & Researcher"

[taxonomies]
  tag = "tags"

[[menu.main]]
  identifier = "resume"
  name = "Resume"
  url = "/resume/"
  weight = 10

[[menu.main]]
  identifier = "publications"
  name = "Publications"
  url = "/publications/"
  weight = 20

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 30

[[menu.main]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/Revys17"
  weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
